<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Dog — your brand's always-on marketing team</title>
<meta name="description" content="Marketing Dog scans your brand, wears your colours, and ships on-brand content across every channel — always kept readable.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf9f6;--bg2:#f1efe9;--panel:#ffffff;--panel2:#f4f2ec;--line:#e8e3d8;--txt:#1b1813;--mut:#6b665d;
--yel:#E8912B;--yelD:#9c5a12;--yelBg:#fdefd6;--yelInk:#231603;--grn:#15803d;--grnBg:#e9f8ef;--grnInk:#ffffff;--warn:#b45309;--err:#dc2626;--r:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font:14px/1.55 'Inter',-apple-system,sans-serif;min-height:100vh}
h1,h2,h3,h4{font-weight:700;letter-spacing:-.01em}
/* ---------- shell ---------- */
#shell{display:none;min-height:100vh}
#shell.on{display:flex}
aside{width:240px;min-width:240px;background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.logo{display:flex;align-items:center;gap:9px;padding:20px 18px 14px;font-size:16px;font-weight:800}
.logo .dot{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--yel),var(--grn));display:grid;place-items:center;font-size:14px}
nav{flex:1;overflow-y:auto;padding:6px 10px}
.navsec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--mut);padding:14px 10px 5px}
.navitem{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;cursor:pointer;color:var(--txt);font-weight:500;margin:1px 0}
.navitem:hover{background:var(--panel2)}
.navitem.on{background:var(--yelBg);color:var(--yelD);font-weight:700}
.bdot{width:9px;height:9px;border-radius:50%;background:var(--yel);flex:none}
.userbox{border-top:1px solid var(--line);padding:13px 16px;font-size:12px}
.userbox b{display:block;max-width:200px;overflow:hidden;text-overflow:ellipsis}
.userbox span{color:var(--mut)}
main{flex:1;padding:26px 34px;max-width:1160px}
/* ---------- common ---------- */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:20px;margin-bottom:16px;box-shadow:0 1px 2px rgba(40,35,10,.04)}
.card h2{font-size:16px;margin-bottom:4px}
.card h3{font-size:14px;margin:14px 0 6px}
.sub{color:var(--mut);font-size:12.5px;margin-bottom:12px}
input,select,textarea{width:100%;background:#fff;border:1px solid var(--line);border-radius:9px;color:var(--txt);padding:10px 13px;font-size:13.5px;margin:4px 0 11px;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--yel);box-shadow:0 0 0 3px rgba(234,179,8,.15)}
label{font-size:12px;color:var(--mut);font-weight:600}
button{background:var(--yel);color:#fff;border:none;border-radius:9px;padding:10px 18px;font-size:13.5px;font-weight:700;cursor:pointer;transition:.12s;font-family:inherit}
button:hover{background:#4f46e5;transform:translateY(-1px)}
button:disabled{opacity:.5;cursor:wait;transform:none}
button.ghost{background:#fff;border:1px solid var(--line);color:var(--txt)}
button.ghost:hover{background:var(--panel2)}
button.grn{background:var(--grn);color:#fff}
button.sm{padding:6px 12px;font-size:12px;border-radius:8px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:13px}
.tag{display:inline-block;font-size:11px;font-weight:600;padding:2px 9px;border-radius:13px;background:var(--panel2);border:1px solid var(--line);color:var(--mut);margin:2px 3px 2px 0}
.tag.y{color:var(--yelD);border-color:var(--yel);background:var(--yelBg)}
.tag.g{color:var(--grn);border-color:#bbf7d0;background:var(--grnBg)}
.tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:18px;border-bottom:1px solid var(--line);padding-bottom:10px}
.tab{padding:7px 14px;border-radius:8px;color:var(--mut);cursor:pointer;font-size:13px;font-weight:600}
.tab:hover{background:var(--panel2)}
.tab.on{background:var(--yel);color:#fff}
.idea{background:#fff;border:1px solid var(--line);border-radius:12px;padding:15px;box-shadow:0 1px 2px rgba(40,35,10,.04)}
.idea h4{font-size:13.5px;margin-bottom:5px}
.idea .hook{color:var(--yelD);font-size:12.5px;font-style:italic;margin-bottom:7px}
.idea p{font-size:12.5px;color:var(--mut)}
.calrow{display:grid;grid-template-columns:92px 56px 92px 1fr auto;gap:10px;padding:9px 14px;border-bottom:1px solid var(--line);font-size:12.5px;align-items:center}
.calrow:hover{background:var(--panel2)}
pre{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:13px;font-size:12px;overflow-x:auto;white-space:pre-wrap;color:#454a55}
.toast{position:fixed;bottom:22px;right:22px;background:#fff;border:1px solid var(--yel);border-left:4px solid var(--yel);border-radius:10px;padding:13px 18px;font-size:13px;max-width:380px;z-index:99;box-shadow:0 8px 30px rgba(0,0,0,.12)}
.toast.err{border-color:var(--err);border-left-color:var(--err)}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid #d6d2bd;border-top-color:var(--yelD);border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.kpi{background:#fff;border:1px solid var(--line);border-radius:12px;padding:15px;text-align:center}
.kpi b{font-size:24px;display:block;color:var(--yelD)}
.kpi span{font-size:11px;color:var(--mut);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.checklist li{font-size:12.5px;color:#4b5160;margin:5px 0 5px 18px}
details{margin:8px 0}
summary{cursor:pointer;font-size:12.5px;font-weight:700;color:var(--yelD)}
.chooser{display:flex;flex-wrap:wrap;gap:7px;margin:8px 0 13px}
.choice{padding:7px 13px;border-radius:9px;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:12.5px;color:var(--mut);font-weight:600}
.choice.on{border-color:var(--yel);color:var(--yelD);background:var(--yelBg)}
img.asset{max-width:420px;width:100%;border-radius:10px;border:1px solid var(--line);margin-top:8px}
.markdown table{border-collapse:collapse;width:100%;margin:8px 0}
.markdown td,.markdown th{border:1px solid var(--line);padding:6px 8px;font-size:11.5px;text-align:left;vertical-align:top}
.markdown th{background:var(--panel2)}
.steps{display:flex;margin-bottom:22px}
.step{flex:1;text-align:center;padding:9px;border-bottom:3px solid var(--line);color:var(--mut);font-size:12.5px;font-weight:700}
.step.on{border-color:var(--yel);color:var(--yelD)}
.step.done{border-color:var(--grn);color:var(--grn)}
.swatch{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);display:inline-block;vertical-align:middle;margin-right:6px}
.feeditem{display:flex;gap:11px;align-items:baseline;padding:8px 4px;border-bottom:1px solid var(--line);font-size:12.5px}
.feeditem .when{color:var(--mut);font-size:11px;min-width:74px}
.aplog{font-family:ui-monospace,monospace;font-size:11.5px;background:var(--panel2);border-radius:8px;padding:10px;max-height:170px;overflow-y:auto;color:#4b5160}
.brandlogo{width:40px;height:40px;border-radius:10px;border:1px solid var(--line);object-fit:contain;background:#fff}
.phone{width:300px;border:1px solid var(--line);border-radius:22px;overflow:hidden;background:#fff;box-shadow:0 4px 18px rgba(20,20,60,.08)}
.phone .ph-h{display:flex;align-items:center;gap:8px;padding:9px 12px;font-size:12px;font-weight:700}
.phone .ph-h img{width:26px;height:26px;border-radius:50%;border:1px solid var(--line);object-fit:contain}
.phone .ph-img{width:100%;aspect-ratio:4/5;object-fit:cover;display:block;background:var(--panel2)}
.phone .ph-a{display:flex;gap:12px;padding:8px 12px;font-size:17px;color:#444}
.phone .ph-c{padding:0 12px 12px;font-size:11.5px;color:#333;max-height:70px;overflow:hidden}
.apbadge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px}
/* ---------- login ---------- */
#login{display:none;min-height:100vh;align-items:center;justify-content:center;background:linear-gradient(160deg,#f7f8fc 60%,#eef2ff)}
#login.on{display:flex}
.logincard{background:#fff;border:1px solid var(--line);border-radius:18px;padding:38px;width:380px;box-shadow:0 20px 60px rgba(40,35,10,.08)}
/* ===== Marketing Dog: BrandSkin overrides · dark-mode tokens · accessibility ===== */
aside,.logincard,.idea,.kpi,.choice,.brandlogo,.phone,input,select,textarea,button.ghost,.card,.toast{background:var(--panel)}
#shell,main{background:var(--bg)}
.logo .dot{background:var(--yel)!important;color:var(--yelInk)}
button{color:var(--yelInk)}
button:hover{background:var(--yel);filter:brightness(1.06)}
button.ghost{color:var(--txt)} button.ghost:hover{background:var(--panel2);filter:none}
button.grn{color:var(--grnInk)}
.tab.on{color:var(--yelInk)}
.navitem.on,.tag.y,.choice.on{background:var(--yelBg);color:var(--yelD)}
.idea .hook,.kpi b,summary,.step.on{color:var(--yelD)}
input:focus,select:focus,textarea:focus{border-color:var(--yel);box-shadow:0 0 0 3px color-mix(in srgb,var(--yel) 24%,transparent)}
.spinner{border-color:color-mix(in srgb,var(--mut) 35%,transparent);border-top-color:var(--yel)}
#login{background:radial-gradient(95% 70% at 50% -10%,color-mix(in srgb,var(--yel) 16%,transparent),transparent 70%),var(--bg)}
pre,.aplog{color:var(--txt);background:var(--panel2)}
.phone{border-top:3px solid var(--yel)}
.phone .ph-h img{border:2px solid var(--yel)!important}
.phone .ph-h span,.phone .ph-c b{color:var(--yelD)}
.idea{border-left:3px solid var(--yel)}
.kpi{border-top:2px solid var(--yelBg)}
.checklist li,.phone .ph-c,.phone .ph-a,.markdown td,.markdown th{color:var(--txt)}
.sub,label{color:var(--mut)}
/* accessibility */
a.skip-link{position:absolute;left:-9999px;top:8px;z-index:1000;background:var(--yel);color:var(--yelInk);padding:10px 16px;border-radius:10px;font-weight:700}
a.skip-link:focus{left:8px}
:where(a,button,input,select,textarea,[tabindex="0"],.navitem,.tab,.choice,.step):focus-visible{outline:2px solid var(--yel);outline-offset:2px;border-radius:8px}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}}
/* appearance control */
#mdAppear{position:fixed;left:18px;bottom:18px;z-index:900;font-family:Inter,sans-serif}
#mdAppear .fab{width:46px;height:46px;border-radius:50%;background:var(--yel);color:var(--yelInk);border:none;font-size:20px;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.20);display:grid;place-items:center;transition:transform .15s}
#mdAppear .fab:hover{transform:translateY(-2px)}
#mdAppear .pop{position:absolute;left:0;bottom:58px;width:252px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px;box-shadow:0 20px 54px rgba(0,0,0,.24);display:none}
#mdAppear.open .pop{display:block}
#mdAppear .pop h4{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--mut);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;font-weight:700}
#mdAppear .seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;margin-bottom:12px}
#mdAppear .seg button{flex:1;background:transparent;color:var(--mut);border:none;padding:8px;font-size:12.5px;border-radius:0;font-weight:600}
#mdAppear .seg button[aria-pressed=true]{background:var(--panel2);color:var(--txt)}
#mdAppear .aa{font-size:10px;font-weight:800;border-radius:20px;padding:2px 8px;background:var(--grn);color:var(--grnInk);letter-spacing:0}
</style>
</head>
<body>
<a href="#main" class="skip-link">Skip to content</a>

<div id="login">
  <div class="logincard">
    <div class="logo" style="padding:0 0 6px"><span class="dot">🐕</span> Marketing Dog</div>
    <p class="sub">Your brand's always-on marketing team — it fetches, you ship. Sign in.</p>
    <label>Email</label><input id="liEmail" type="email" placeholder="you@company.com">
    <label>Password</label><input id="liPw" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin(this)">
    <button style="width:100%;margin-top:6px" onclick="doLogin(this)">Sign in</button>
    <p class="sub" id="liErr" style="color:var(--err);margin-top:10px"></p>
    <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--line);display:flex;align-items:center;gap:8px;color:var(--mut);font-size:11.5px">
      <span class="dot" style="width:20px;height:20px;font-size:11px">🐾</span> Powered by <b style="color:var(--yelD)">Marketing Dog</b> — brand-adaptive &amp; accessible by design.
    </div>
  </div>
</div>

<div id="shell">
  <aside>
    <div class="logo" onclick="nav('dash')" style="cursor:pointer"><span class="dot">🐕</span> Marketing Dog</div>
    <nav id="sidenav"></nav>
    <div class="userbox">
      <b id="uEmail"></b><span id="uRole"></span><br>
      <button class="sm ghost" style="margin-top:8px" onclick="logout()">Sign out</button>
    </div>
  </aside>
  <main id="main"></main>
</div>
<div id="toasts" aria-live="polite" aria-atomic="false"></div>

<script>
let TOKEN = localStorage.getItem("mb_token") || "";
let ME = JSON.parse(localStorage.getItem("mb_me") || "null");
let state = { view:"dash", brand:null, tab:"overview", wizard:null };
let BRANDS = [];

async function api(path, method="GET", body=null, raw=false){
  const opt = {method, headers:{}};
  if(TOKEN) opt.headers["Authorization"] = "Bearer "+TOKEN;
  if(body && !raw){ opt.headers["Content-Type"]="application/json"; opt.body = JSON.stringify(body); }
  if(body && raw){ opt.body = body; }
  const r = await fetch("/api"+path, opt);
  if(r.status===401){ logout(); throw new Error("Session expired — sign in again"); }
  if(!r.ok){ let d; try{d=await r.json()}catch{d={detail:r.statusText}}; throw new Error(typeof d.detail==="string"?d.detail:JSON.stringify(d.detail)); }
  return r.json();
}
function toast(msg, err=false){
  const t=document.createElement("div"); t.className="toast"+(err?" err":""); t.textContent=msg;
  document.getElementById("toasts").appendChild(t); setTimeout(()=>t.remove(), err?7000:4000);
}
function esc(s){return (s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
function busy(btn,on,label){ if(!btn)return; btn.disabled=on; if(on){btn.dataset.l=btn.innerHTML; btn.innerHTML='<span class="spinner"></span>'+(label||"Working…");} else if(btn.dataset.l) btn.innerHTML=btn.dataset.l; }
const $=id=>document.getElementById(id);
const isAdmin=()=>ME && ME.role==="admin";

/* ---------- auth ---------- */
async function doLogin(btn){
  busy(btn,true,"Signing in…"); $("liErr").textContent="";
  try{
    const r = await api("/auth/login","POST",{email:$("liEmail").value.trim(),password:$("liPw").value});
    TOKEN=r.token; ME=r; localStorage.setItem("mb_token",TOKEN); localStorage.setItem("mb_me",JSON.stringify(r));
    boot();
  }catch(e){ $("liErr").textContent=e.message; busy(btn,false); }
}
function logout(){ TOKEN=""; ME=null; localStorage.removeItem("mb_token"); localStorage.removeItem("mb_me"); showLogin(); }
function showLogin(){ $("login").classList.add("on"); $("shell").classList.remove("on"); }

/* ---------- boot & nav ---------- */
async function boot(){
  if(!TOKEN){ showLogin(); return; }
  try{ await api("/auth/me"); }catch{ return; }
  $("login").classList.remove("on"); $("shell").classList.add("on");
  $("uEmail").textContent = ME.email||""; $("uRole").textContent = ME.role==="admin"?"Administrator":"Client";
  await loadBrands();
  if(!isAdmin() && BRANDS.length===1){ openBrand(BRANDS[0].id); } else nav("dash");
}
async function loadBrands(){ BRANDS = await api("/brands"); renderSidebar(); }
function renderSidebar(){
  let h="";
  h+=`<div class="navitem ${state.view==='dash'?'on':''}" onclick="nav('dash')">📊 Dashboard</div>`;
  if(isAdmin()) h+=`<div class="navitem" onclick="startWizard()">➕ New Brand</div>`;
  const groups={};
  BRANDS.forEach(b=>{ (groups[b.grp||""]=groups[b.grp||""]||[]).push(b); });
  for(const [g,list] of Object.entries(groups)){
    h+=`<div class="navsec">${g?("📁 "+esc(g)):"Brands"}</div>`;
    list.forEach(b=>{
      const col=(((b.profile||{}).brand_kit||{}).colors||[])[0]||"#6366f1";
      h+=`<div class="navitem ${state.brand&&state.brand.id===b.id?'on':''}" onclick="openBrand('${b.id}')"><span class="bdot" style="background:${col}"></span>${esc(b.name)}</div>`;
    });
  }
  $("sidenav").innerHTML=h;
}
function nav(view){ state.view=view; state.brand=null; renderSidebar(); if(view==="dash") renderDash(); }

/* ---------- dashboard ---------- */
async function renderDash(){
  const m=$("main");
  m.innerHTML=`<h1 style="font-size:21px;margin-bottom:4px">Dashboard</h1>
  <p class="sub">${isAdmin()?"All client brands at a glance — and the autopilot that runs them.":"Your brand at a glance."}</p>
  <div id="dashBody"><span class="spinner"></span></div>`;
  const [feed, ap, dg] = await Promise.all([api("/activity"), api("/autopilot/status"), api("/digest")]);
  let h="";
  h+=`<div class="card" style="border-left:4px solid var(--yel);border-radius:0 14px 14px 0"><h2>\ud83d\udcc5 Due today (${dg.due_today.length})</h2>`+
    (dg.due_today.length? dg.due_today.map(d=>`<div class="feeditem"><span class="when">${esc(d.time||"")}</span><span class="tag y" style="margin:0">${esc(d.brand)}</span><span class="tag" style="margin:0">${esc(d.channel||"")}</span><span>${esc(d.title||"")}</span></div>`).join("")
    : '<p class="sub" style="margin:6px 0 0">Nothing scheduled for today.</p>')+`</div>`;
  if(dg.needs_approval.length||dg.changes_requested.length){
    h+=`<div class="card" style="border-left:4px solid var(--warn);border-radius:0 14px 14px 0"><h2>\u270b Needs review (${dg.needs_approval.length+dg.changes_requested.length})</h2>`+
      dg.needs_approval.map(d=>`<div class="feeditem"><span class="tag y" style="margin:0">${esc(d.brand)}</span><span class="tag" style="margin:0">${esc(d.format||"")}</span><span>${esc(d.title||"")}</span><button class="sm ghost" onclick="openBrand('${d.brand_id}').then(()=>{state.tab='creatives';renderBrand()})">review</button></div>`).join("")+
      dg.changes_requested.map(d=>`<div class="feeditem"><span class="tag" style="margin:0;color:var(--err);border-color:var(--err)">changes requested</span><span class="tag y" style="margin:0">${esc(d.brand)}</span><span>${esc(d.title||"")} \u2014 <i>${esc(d.comment||"")}</i></span></div>`).join("")+`</div>`;
  }
  h+=`<div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(160px,1fr));margin-bottom:16px">
    <div class="kpi"><b>${BRANDS.length}</b><span>brands</span></div>
    <div class="kpi"><b>${BRANDS.filter(b=>b.status==='ready').length}</b><span>fully set up</span></div>
    <div class="kpi"><b>${feed.filter(f=>f.type==='creative').length}</b><span>recent creatives</span></div>
    <div class="kpi"><b>${feed.filter(f=>f.type==='publish').length}</b><span>recent publishes</span></div>
  </div>`;
  if(isAdmin()){
    h+=`<div class="card"><div class="row"><h2>🤖 Autopilot</h2>
      <button onclick="runAutopilotAll(this)">▶ Run autopilot for ALL brands</button>
      <span class="sub" style="margin:0">Generates ideas, builds calendars, and produces creatives for every ready brand — unattended.</span></div>
      <div id="apStatus">${renderApStatus(ap)}</div></div>`;
  } else {
    h+=`<div class="card" id="apStatus">${renderApStatus(ap)}</div>`;
  }
  h+=`<div class="card"><h2>Latest updates across ${isAdmin()?"all brands":"your brand"}</h2><div style="margin-top:8px">`+
    (feed.length? feed.map(f=>`<div class="feeditem">
      <span class="when">${f.at?new Date(f.at*1000).toLocaleString([], {month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}):""}</span>
      <span class="tag y" style="margin:0">${esc(f.brand)}</span>
      <span class="tag" style="margin:0">${f.type}</span>
      <span>${esc(f.title)}</span></div>`).join("") : '<p class="sub">No activity yet — run autopilot or generate ideas.</p>')+`</div></div>`;
  if(isAdmin()) h+=await renderUsersCard();
  $("dashBody").innerHTML=h;
  pollAutopilot();
}
function renderApStatus(ap){
  const entries=Object.entries(ap||{}).filter(([k,v])=>v);
  if(!entries.length) return '<p class="sub" style="margin:8px 0 0">Autopilot idle. No runs this session.</p>';
  return entries.map(([bid,s])=>{
    const b=BRANDS.find(x=>x.id===bid);
    const stateTag = s.state==="running"?'<span class="tag y">running</span>':s.state==="done"?'<span class="tag g">done</span>':'<span class="tag" style="color:var(--err)">failed</span>';
    return `<div style="margin-top:10px"><b>${esc(b?b.name:bid)}</b> ${stateTag}
      <div class="aplog">${(s.log||[]).map(esc).join("<br>")}</div></div>`;
  }).join("");
}
let apTimer=null;
async function pollAutopilot(){
  clearTimeout(apTimer);
  try{

async function buildVideo(cid,btn){
  busy(btn,true,"Rendering video…");
  try{
    const b=state.brand;
    const c=(await api(`/brands/${b.id}/creatives`)).find(x=>x.id===cid);
    const p=c.payload, s=p.script||{};
    const loadImg=u=>new Promise((res,rej)=>{const im=new Image();im.crossOrigin="anonymous";im.onload=()=>res(im);im.onerror=()=>rej(new Error("couldn't load visual"));im.src=assetUrl(b,u)+(u.startsWith("http")?"":"?t="+Date.now());});
    let sceneImgs=[];
    if(p.scene_assets&&p.scene_assets.length){ sceneImgs=await Promise.all(p.scene_assets.map(loadImg)); }
    const img=sceneImgs[0]||await loadImg(c.asset_path);
    const cv=document.createElement("canvas"); cv.width=540; cv.height=960;
    const ctx=cv.getContext("2d");
    const stream=cv.captureStream(30);
    let voEl=null;
    if(p.vo_asset){
      voEl=new Audio(assetUrl(b,p.vo_asset));
      voEl.crossOrigin="anonymous";
      const actx=new AudioContext();
      const srcNode=actx.createMediaElementSource(voEl);
      const dest=actx.createMediaStreamDestination();
      srcNode.connect(dest);
      dest.stream.getAudioTracks().forEach(t=>stream.addTrack(t));
    }
    const rec=new MediaRecorder(stream,{mimeType:MediaRecorder.isTypeSupported("video/webm;codecs=vp9")?"video/webm;codecs=vp9":"video/webm"});
    const chunks=[]; rec.ondataavailable=e=>chunks.push(e.data);
    const done=new Promise(res=>{rec.onstop=res;});
    rec.start();
    if(voEl){ try{ await voEl.play(); }catch{} }
    const colors=(((b.profile||{}).brand_kit||{}).colors)||["#6366f1"];
    const hook=(s.hook_options||[p.title])[0]||p.title;
    const rsScenes=(p.reel_studio||{}).scenes||[];
    const texts=(rsScenes.length?rsScenes.map(x=>x.on_screen_text):(s.shots||[]).map(sh=>sh.on_screen_text)).filter(Boolean).slice(0,6);
    if(!texts.length) texts.push(p.cta||"Follow for more");
    function wrap(t,x,y,maxW,lh){
      const words=String(t).split(" "); let line="", yy=y;
      for(const w of words){ const test=line?line+" "+w:w;
        if(ctx.measureText(test).width>maxW&&line){ ctx.fillText(line,x,yy); line=w; yy+=lh; } else line=test; }
      ctx.fillText(line,x,yy);
    }
    const FPS=30, hookSec=2.2, perText=1.8, outroSec=2;
    const total=Math.round(FPS*(hookSec+texts.length*perText+outroSec));
    for(let f=0;f<total;f++){
      const t=f/FPS;
      ctx.fillStyle="#0c0e16"; ctx.fillRect(0,0,540,960);
      if(t<hookSec){
        ctx.fillStyle=colors[0]; ctx.fillRect(0,0,540,960);
        ctx.fillStyle="#fff"; ctx.font="700 44px Inter,Arial"; ctx.textAlign="center";
        wrap(hook,270,420,460,54);
      } else if(t<hookSec+texts.length*perText){
        const i=Math.floor((t-hookSec)/perText);
        const zt=((t-hookSec)%perText)/perText;
        const z=1.05+zt*0.08;
        const cur=sceneImgs.length?(sceneImgs[Math.min(i,sceneImgs.length-1)]):img;
        const iw=540*z, ih=iw*cur.height/cur.width;
        ctx.drawImage(cur,(540-iw)/2,(960-ih)/2,iw,ih);
        ctx.fillStyle="rgba(0,0,0,.45)"; ctx.fillRect(0,700,540,260);
        ctx.fillStyle="#fff"; ctx.font="700 34px Inter,Arial"; ctx.textAlign="center";
        wrap(texts[i]||"",270,790,470,44);
      } else {
        ctx.fillStyle=colors[0]; ctx.fillRect(0,0,540,960);
        ctx.fillStyle="#fff"; ctx.font="700 40px Inter,Arial"; ctx.textAlign="center";
        wrap(p.cta||"Follow "+b.name,270,440,460,50);
        ctx.font="400 24px Inter,Arial"; ctx.fillText(b.website||"",270,560);
      }
      await new Promise(r=>setTimeout(r,1000/FPS));
    }
    if(voEl) voEl.pause();
    rec.stop(); await done;
    const blob=new Blob(chunks,{type:"video/webm"});
    const url=URL.createObjectURL(blob);
    $("vout_"+cid).innerHTML=`<div class="row" style="margin-top:10px"><video src="${url}" controls style="width:240px;border-radius:12px;border:1px solid var(--line)"></video>
      <a href="${url}" download="${esc(b.slug)}-reel.webm"><button class="sm">⬇ Download video</button></a>
      <span class="sub" style="margin:0">Draft animatic — hook → visual with captions → CTA. Use as a base or post as-is.</span></div>`;
    busy(btn,false); toast("Video ready below the creative");
  }catch(e){ toast(e.message,true); busy(btn,false); }
}

<script>
/* ===== Marketing Dog — BrandSkin adaptive theming (WCAG-AA by construction) =====
   Maps a brand's primary colour onto the app's CSS variables and keeps every
   token legible. Auto-skins to each brand's scanned palette; light + dark. */
(function(){
  const clamp01=x=>x<0?0:x>1?1:x, clmp=(x,a,b)=>x<a?a:x>b?b:x;
  const hexToRgb=h=>{h=String(h).trim().replace(/^#/,'');if(h.length===3)h=h.split('').map(c=>c+c).join('');const n=parseInt(h,16);return{r:(n>>16)&255,g:(n>>8)&255,b:n&255}};
  const rgbToHex=({r,g,b})=>'#'+[r,g,b].map(v=>Math.round(clmp(v,0,255)).toString(16).padStart(2,'0')).join('');
  const s2l=c=>{c/=255;return c<=0.04045?c/12.92:Math.pow((c+0.055)/1.055,2.4)};
  const l2s=c=>{const v=c<=0.0031308?c*12.92:1.055*Math.pow(c,1/2.4)-0.055;return clamp01(v)*255};
  const lum=x=>{const c=typeof x==='string'?hexToRgb(x):x;return 0.2126*s2l(c.r)+0.7152*s2l(c.g)+0.0722*s2l(c.b)};
  const contrast=(a,b)=>{const L1=lum(a),L2=lum(b),hi=Math.max(L1,L2),lo=Math.min(L1,L2);return(hi+0.05)/(lo+0.05)};
  const bestFg=bg=>contrast('#ffffff',bg)>=contrast('#000000',bg)?'#ffffff':'#000000';
  function rgbToOklab({r,g,b}){const lr=s2l(r),lg=s2l(g),lb=s2l(b);const l=0.4122214708*lr+0.5363325363*lg+0.0514459929*lb,m=0.2119034982*lr+0.6806995451*lg+0.1073969566*lb,s=0.0883024619*lr+0.2817188376*lg+0.6299787005*lb;const l_=Math.cbrt(l),m_=Math.cbrt(m),s_=Math.cbrt(s);return{L:0.2104542553*l_+0.7936177850*m_-0.0040720468*s_,a:1.9779984951*l_-2.4285922050*m_+0.4505937099*s_,b:0.0259040371*l_+0.7827717662*m_-0.8086757660*s_}}
  function oklabToRgb({L,a,b}){const l_=L+0.3963377774*a+0.2158037573*b,m_=L-0.1055613458*a-0.0638541728*b,s_=L-0.0894841775*a-1.2914855480*b;const l=l_**3,m=m_**3,s=s_**3;return{r:l2s(4.0767416621*l-3.3077115913*m+0.2309699292*s),g:l2s(-1.2684380046*l+2.6097574011*m-0.3413193965*s),b:l2s(-0.0041960863*l-0.7034186147*m+1.7076147010*s)}}
  const toOklch=rgb=>{const{L,a,b}=rgbToOklab(rgb);return{L,C:Math.hypot(a,b),h:Math.atan2(b,a)}};
  const oklchHex=({L,C,h})=>rgbToHex(oklabToRgb({L,a:C*Math.cos(h),b:C*Math.sin(h)}));
  const hexOklch=h=>toOklch(hexToRgb(h));
  const withL=(hex,L,cs=1)=>{const o=hexOklch(hex);return oklchHex({L:clamp01(L),C:o.C*cs,h:o.h})};
  function ensure(fg,bg,t){if(contrast(fg,bg)>=t)return fg;const d=lum(bg)<0.5?1:-1,o=hexOklch(fg);let best=fg,bc=contrast(fg,bg);for(let i=1;i<=120;i++){const k=i/120,L=clamp01(o.L+d*k),cand=oklchHex({L,C:o.C*Math.max(0.15,1-k*0.7),h:o.h}),c=contrast(cand,bg);if(c>bc){bc=c;best=cand}if(c>=t)return cand}const bw=bestFg(bg);return contrast(bw,bg)>bc?bw:best}
  function buildTheme(p){const ph=hexOklch(p).h,nu=(L,C=0.008)=>oklchHex({L,C,h:ph});
    const dBg=nu(0.16,0.012);let dA=withL(p,Math.max(0.74,hexOklch(p).L));dA=ensure(dA,dBg,3);
    const dark={bg:dBg,bg2:nu(0.195,0.012),panel:nu(0.215,0.014),panel2:nu(0.255,0.014),line:nu(0.315,0.01),ink:ensure(nu(0.965,0.004),dBg,7),mute:ensure(nu(0.7,0.012),dBg,4.5),accent:dA,accentInk:ensure(bestFg(dA),dA,4.5),good:ensure('#34d399',dBg,3),warn:ensure('#fbbf24',dBg,3),danger:ensure('#fb7185',dBg,3)};
    const lBg=nu(0.99,0.004);let lA=withL(p,Math.min(0.56,hexOklch(p).L));lA=ensure(lA,lBg,3);
    const light={bg:lBg,bg2:nu(0.972,0.005),panel:'#ffffff',panel2:nu(0.965,0.006),line:nu(0.9,0.012),ink:ensure(nu(0.24,0.02),lBg,7),mute:ensure(nu(0.52,0.02),lBg,4.5),accent:lA,accentInk:ensure(bestFg(lA),lA,4.5),good:ensure('#15803d',lBg,3),warn:ensure('#b45309',lBg,3),danger:ensure('#dc2626',lBg,3)};
    return{light,dark}}

  let MODE=localStorage.getItem('md_mode')||'light', OVERRIDE=null, LASTKEY='';
  const DOG='#E8912B';
  const isHex=c=>/^#?[0-9a-fA-F]{6}$/.test(String(c||'').replace('#',''));
  const norm=c=>{c=String(c);return c[0]==='#'?c:'#'+c};
  function brandPrimary(){try{const b=(typeof state!=='undefined'&&state)?state.brand:null;if(!b)return null;const k=(b.profile&&b.profile.brand_kit)||{};let c=(k.colors&&k.colors[0])||(b.scrape&&b.scrape.colors&&b.scrape.colors[0]);return isHex(c)?norm(c):null;}catch(e){return null}}
  function apply(primary){
    if(!isHex(primary))primary=DOG; primary=norm(primary);
    const t=buildTheme(primary)[MODE], R=document.documentElement.style, S=(k,v)=>R.setProperty(k,v);
    S('--bg',t.bg);S('--bg2',t.bg2);S('--panel',t.panel);S('--panel2',t.panel2);S('--line',t.line);
    S('--txt',t.ink);S('--mut',ensure(t.mute,MODE==='dark'?t.panel:t.bg,4.5));S('--yel',t.accent);S('--yelInk',t.accentInk);
    const yelBg=withL(t.accent,MODE==='dark'?0.27:0.93,0.7);S('--yelBg',yelBg);S('--yelD',ensure(t.accent,yelBg,4.5));
    S('--grn',t.good);S('--grnBg',withL(t.good,MODE==='dark'?0.27:0.93,0.6));S('--grnInk',ensure(bestFg(t.good),t.good,4.5));
    S('--warn',t.warn);S('--err',t.danger);
    document.documentElement.dataset.mode=MODE;
    const aa=document.getElementById('mdAA');
    if(aa){const ok=contrast(t.ink,t.bg)>=4.5&&contrast(t.accentInk,t.accent)>=4.5;aa.textContent=ok?'WCAG AA ✓':'check';aa.style.background=ok?'var(--grn)':'var(--err)';aa.style.color=ok?'var(--grnInk)':'#fff';}
    const ci=document.getElementById('mdColor');if(ci&&isHex(primary))ci.value=primary;
  }
  function esc2(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
  function brandLogo(){try{const b=(typeof state!=='undefined'&&state)?state.brand:null;if(!b)return null;const k=(b.profile&&b.profile.brand_kit)||{};if(k.logo)return '/workspaces/'+(b.grp?b.grp+'/':'')+b.slug+'/'+k.logo;if(b.scrape&&b.scrape.logo)return b.scrape.logo;return null;}catch(e){return null;}}
  function updateIdentity(){const el=document.querySelector('#shell aside .logo');if(!el)return;let b=null;try{b=(typeof state!=='undefined'&&state)?state.brand:null;}catch(e){}
    if(b&&b.name){const lg=brandLogo();el.innerHTML=(lg?'<img src="'+lg+'" alt="" referrerpolicy="no-referrer" onerror="this.style.display=\'none\'" style="width:26px;height:26px;border-radius:7px;object-fit:contain;background:var(--panel);border:1px solid var(--line)">':'<span class="dot">🐕</span>')+' <span style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:middle">'+esc2(b.name)+'</span>';}
    else{el.innerHTML='<span class="dot">🐕</span> Marketing Dog';}}
  let PREVIEW=null, LASTBRAND='__init__';
  function reskin(){apply(PREVIEW||OVERRIDE||brandPrimary()||DOG);updateIdentity();}
  window.mdReskin=reskin;
  window.mdPreview=function(h){PREVIEW=h||null;LASTKEY='';reskin();};
  window.mdPreviewReset=function(){PREVIEW=null;LASTKEY='';reskin();};
  setInterval(function(){let b=null;try{b=(typeof state!=='undefined'&&state)?state.brand:null;}catch(e){}var bid=b?b.id:'dash';if(bid!==LASTBRAND){LASTBRAND=bid;PREVIEW=null;}const p=brandPrimary();const key=(PREVIEW||'')+'|'+(OVERRIDE||'')+'|'+MODE+'|'+bid+'|'+(p||'dog');if(key!==LASTKEY){LASTKEY=key;reskin();}},500);

  function segState(){document.querySelectorAll('#mdAppear .seg button').forEach(b=>b.setAttribute('aria-pressed',b.dataset.m===MODE));}
  function mount(){
    if(document.getElementById('mdAppear'))return;
    const w=document.createElement('div');w.id='mdAppear';
    w.innerHTML='<button class="fab" aria-label="Appearance settings" aria-expanded="false">🎨</button>'+
      '<div class="pop" role="dialog" aria-label="Appearance"><h4>Appearance <span class="aa" id="mdAA">WCAG AA ✓</span></h4>'+
      '<div class="seg" role="group" aria-label="Colour mode"><button data-m="light">☀️ Light</button><button data-m="dark">🌙 Dark</button></div>'+
      '<label style="font-size:12px;color:var(--mut);font-weight:600">Brand accent</label>'+
      '<div style="display:flex;gap:8px;align-items:center;margin-top:4px"><input type="color" id="mdColor" value="#E8912B" aria-label="Brand accent colour" style="width:42px;height:34px;padding:0;border:1px solid var(--line);border-radius:8px;background:none;cursor:pointer"><button class="sm ghost" id="mdAuto" style="margin:0">Use brand colours</button></div>'+
      '<p class="sub" style="margin:10px 0 0;font-size:11.5px">The UI adapts to each brand’s scanned colours — always kept readable.</p></div>';
    document.body.appendChild(w);
    const fab=w.querySelector('.fab');
    fab.addEventListener('click',()=>{const o=w.classList.toggle('open');fab.setAttribute('aria-expanded',o);});
    w.querySelectorAll('.seg button').forEach(b=>b.addEventListener('click',()=>{MODE=b.dataset.m;localStorage.setItem('md_mode',MODE);segState();LASTKEY='';reskin();}));
    w.querySelector('#mdColor').addEventListener('input',e=>{OVERRIDE=e.target.value;LASTKEY='';reskin();});
    w.querySelector('#mdAuto').addEventListener('click',()=>{OVERRIDE=null;LASTKEY='';reskin();});
    segState();reskin();
  }
  if(document.readyState!=='loading')mount();else document.addEventListener('DOMContentLoaded',mount);
  reskin();
})();
</script>
</body>
</html>
