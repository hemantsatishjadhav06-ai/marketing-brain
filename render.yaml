# Render Blueprint — deploys the whole marketing-brain stack.
#
# Click https://dashboard.render.com/blueprint/new?repo=https://github.com/hemantsatishjadhav06-ai/marketing-brain
# Render will read this file and prompt for any `sync: false` env vars.
#
# Free-tier notes:
# - Postgres free expires after 90 days (upgrade to keep data after that).
# - API + Web web services spin down after 15 min idle on free.
# - Worker process is NOT included — agents run synchronously inside the API
#   process so the whole thing works on $0. Promote to a dedicated worker
#   when traffic grows by adding a `type: worker` block with the same image.

databases:
  - name: marketing-brain-db
    plan: free
    databaseName: marketing_brain
    user: brain
    postgresMajorVersion: 16

services:
  # Redis (Render KeyValue) for SSE event broker + future rate-limits
  - type: keyvalue
    name: marketing-brain-redis
    plan: free
    ipAllowList: []

  # FastAPI backend
  - type: web
    name: marketing-brain-api
    runtime: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marketing-brain-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: marketing-brain-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PUBLIC_BASE_URL
        sync: false                  # paste the API render URL once first deploy is up
      - key: CORS_ORIGINS
        sync: false                  # comma-sep list incl. the web service URL
      - key: STORAGE_BACKEND
        value: local
      - key: STORAGE_LOCAL_PATH
        value: /opt/render/project/src/storage
      - key: DEFAULT_OWNER_EMAIL
        value: owner@marketing-brain.local
      - key: DEFAULT_OWNER_PASSWORD
        sync: false                  # set a strong one in dashboard
      - key: DEFAULT_ORG_NAME
        value: Racket Sports Group
      - key: DEFAULT_MONTHLY_COST_CAP_USD
        value: "200"
      - key: OPENROUTER_API_KEY
        sync: false                  # optional — agents fall back if unset
      - key: FAL_KEY
        sync: false                  # optional
      - key: STRIPE_SECRET_KEY
        sync: false                  # optional
      - key: STRIPE_PRICE_ID
        sync: false                  # optional
      - key: SHOPIFY_WEBHOOK_SECRET
        sync: false                  # required only if you wire Shopify

  # Next.js cockpit + landing
  - type: web
    name: marketing-brain-web
    runtime: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: ./apps/web
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: marketing-brain-api
          property: hostport
      - key: NODE_ENV
        value: production
