    <rect x="10" y="10" width="580" height="260" rx="10" fill="#15151D"/>
    <text x="300" y="100" text-anchor="middle" fill="#CCFF00" font-family="Fraunces, serif" font-size="28">How to choose grip size</text>
    <text x="300" y="130" text-anchor="middle" fill="#8A8A95" font-size="12">— beginner guide</text>
    <rect x="10" y="252" width="580" height="18" fill="#CCFF00"/>
  </g>
  <!-- caption editable card -->
  <g transform="translate(290,398)">
