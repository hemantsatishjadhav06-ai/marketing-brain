<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Inter, system-ui, sans-serif">
  <rect width="1280" height="720" fill="#07070A"/>
  <rect width="260" height="720" fill="#0F0F14"/>
  <rect x="259" width="1" height="720" fill="#23232E"/>
  <text x="290" y="50" fill="#F5F5F7" font-family="Fraunces, serif" font-size="28">How to choose grip size — beginner guide</text>
  <g transform="translate(290,66)" font-size="11">
    <rect width="56" height="18" rx="9" fill="#44E08F" fill-opacity="0.15"/>
    <text x="28" y="13" text-anchor="middle" fill="#44E08F" font-family="JetBrains Mono, monospace">approved</text>
    <text x="68" y="13" fill="#8A8A95" font-family="JetBrains Mono, monospace">instagram · static_post · static_post</text>
  </g>
  <!-- action buttons -->
  <g transform="translate(810,38)" font-size="12">
    <rect width="92" height="36" rx="10" fill="#15151D" stroke="#23232E"/><text x="46" y="22" text-anchor="middle" fill="#F5F5F7">Run critic</text>
    <g transform="translate(100,0)"><rect width="128" height="36" rx="10" fill="#CCFF00"/><text x="64" y="22" text-anchor="middle" fill="#0A0A0A" font-weight="500">Send to review</text></g>
    <g transform="translate(236,0)"><rect width="148" height="36" rx="10" fill="#15151D" stroke="#23232E"/><text x="74" y="22" text-anchor="middle" fill="#F5F5F7">⬇ Download bundle</text></g>
  </g>
  <!-- main: media + caption -->
  <g transform="translate(290,108)">
    <rect width="600" height="280" rx="14" fill="#0F0F14" stroke="#23232E"/>
