<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Inter, system-ui, sans-serif">
  <defs>
    <radialGradient id="aurora" cx="50%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#CCFF00" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#07070A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aurora2" cx="90%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#78C8FF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#07070A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="720" fill="#07070A"/>
  <rect width="1280" height="720" fill="url(#aurora)"/>
  <rect width="1280" height="720" fill="url(#aurora2)"/>
  <!-- nav -->
  <g transform="translate(180,40)">
    <rect x="0" y="0" width="10" height="10" rx="2" fill="#CCFF00"/>
    <rect x="12" y="0" width="10" height="10" rx="2" fill="#22D3EE"/>
    <rect x="0" y="12" width="10" height="10" rx="2" fill="#F59E0B"/>
    <rect x="12" y="12" width="10" height="10" rx="2" fill="#A78BFA"/>
    <text x="32" y="18" fill="#F5F5F7" font-size="20" font-weight="500" font-family="Fraunces, serif">Marketing Brain</text>
  </g>
  <g transform="translate(560,48)" fill="#8A8A95" font-size="14">
    <text x="0" y="0">Features</text>
    <text x="80" y="0">Agents</text>
    <text x="160" y="0">How it works</text>
    <text x="270" y="0">GitHub</text>
  </g>
  <g transform="translate(940,30)">
    <rect width="80" height="34" rx="10" fill="#15151D"/>
    <text x="22" y="22" fill="#8A8A95" font-size="13">Log in</text>
    <rect x="92" y="0" width="120" height="34" rx="10" fill="#CCFF00"/>
    <text x="112" y="22" fill="#0A0A0A" font-size="13" font-weight="500">Get started</text>
  </g>
  <!-- hero pill -->
  <g transform="translate(490,160)">
    <rect width="300" height="32" rx="16" fill="#15151D" stroke="#23232E"/>
    <circle cx="20" cy="16" r="3" fill="#CCFF00"/>
    <text x="32" y="20" fill="#8A8A95" font-size="11" font-family="JetBrains Mono, monospace">v0.5 · 8 publishers · 15 agents</text>
  </g>
  <text x="640" y="280" fill="#F5F5F7" font-size="68" font-family="Fraunces, serif" font-weight="500" text-anchor="middle" letter-spacing="-2">An AI marketing team</text>
  <text x="640" y="350" fill="#CCFF00" font-size="68" font-family="Fraunces, serif" font-weight="500" text-anchor="middle" letter-spacing="-2">for every sport vertical.</text>
  <text x="640" y="410" fill="#C9C9D2" font-size="18" text-anchor="middle">Marketing Brain runs your content operation end-to-end: scored ideas, a planned</text>
  <text x="640" y="436" fill="#C9C9D2" font-size="18" text-anchor="middle">calendar, on-brand drafts, brand-safe critique, and one-click publishing.</text>
  <!-- CTAs -->
  <g transform="translate(490,490)">
    <rect width="200" height="50" rx="14" fill="#CCFF00"/>
    <text x="100" y="32" text-anchor="middle" fill="#0A0A0A" font-size="15" font-weight="500">Open the cockpit →</text>
    <rect x="216" y="0" width="200" height="50" rx="14" fill="#15151D" stroke="#23232E"/>
    <text x="316" y="32" text-anchor="middle" fill="#F5F5F7" font-size="15">See how it works</text>
  </g>
  <!-- sport pills -->
  <g transform="translate(420,580)" font-family="JetBrains Mono, monospace" font-size="11">
    <g transform="translate(0,0)"><rect width="80" height="26" rx="13" fill="#15151D" stroke="#23232E"/><text x="40" y="17" text-anchor="middle" fill="#CCFF00">● Tennis</text></g>
    <g transform="translate(88,0)"><rect width="80" height="26" rx="13" fill="#15151D" stroke="#23232E"/><text x="40" y="17" text-anchor="middle" fill="#22D3EE">● Padel</text></g>
    <g transform="translate(176,0)"><rect width="90" height="26" rx="13" fill="#15151D" stroke="#23232E"/><text x="45" y="17" text-anchor="middle" fill="#F59E0B">● Pickleball</text></g>
    <g transform="translate(274,0)"><rect width="90" height="26" rx="13" fill="#15151D" stroke="#23232E"/><text x="45" y="17" text-anchor="middle" fill="#A78BFA">● Badminton</text></g>
    <g transform="translate(372,0)"><rect width="80" height="26" rx="13" fill="#15151D" stroke="#23232E"/><text x="40" y="17" text-anchor="middle" fill="#EF4444">● Squash</text></g>
  </g>
</svg>
